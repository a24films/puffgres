name: Update Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/src/**"
      - "crates/cli/src/main.rs"
      - "scripts/generate-wiki.sh"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wiki-${{ hashFiles('**/Cargo.lock') }}

      - name: Build puffgres
        run: cargo build --release --bin puffgres

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: a24films/puffgres.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wiki pages
        run: |
          chmod +x scripts/generate-wiki.sh
          PUFFGRES_BIN=./target/release/puffgres WIKI_DIR=./wiki scripts/generate-wiki.sh

      - name: Push wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "docs: update wiki from $(git -C .. rev-parse --short HEAD)"
            git push
          fi
