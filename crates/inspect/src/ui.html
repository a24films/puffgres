<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>puffgres inspect</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: ui-monospace, 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 13px; background: #0a0a0a; color: #e0e0e0; padding: 24px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #fff; }
  h2 { font-size: 13px; font-weight: 600; margin: 24px 0 8px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
  .actions { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; }
  .actions a, .actions button { display: inline-block; padding: 6px 12px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; text-decoration: none; font-family: inherit; font-size: 12px; cursor: pointer; }
  .actions a:hover, .actions button:hover { background: #252525; border-color: #555; }
  .path { color: #666; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  th { text-align: left; padding: 6px 10px; border-bottom: 1px solid #333; color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
  td { padding: 6px 10px; border-bottom: 1px solid #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  tr:hover td { background: #111; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
  .badge-active { background: #0a2e1a; color: #4ade80; }
  .badge-tombstoned { background: #2e0a0a; color: #f87171; }
  .badge-completed { background: #0a2e1a; color: #4ade80; }
  .badge-in_progress { background: #1a1a0a; color: #facc15; }
  .badge-pending { background: #1a1a2e; color: #60a5fa; }
  .badge-failed { background: #2e0a0a; color: #f87171; }
  .badge-retryable { background: #1a1a0a; color: #facc15; }
  .badge-permanent { background: #2e0a0a; color: #f87171; }
  .stat { display: inline-block; margin-right: 16px; }
  .stat-label { color: #666; }
  .stat-value { color: #fff; font-weight: 600; }
  .empty { color: #444; padding: 12px 10px; }
  .error { color: #f87171; padding: 12px; background: #1a0a0a; border-radius: 4px; margin: 8px 0; }
  .loading { color: #666; padding: 12px 10px; }
</style>
</head>
<body>

<h1>puffgres inspect</h1>

<div class="actions">
  <button onclick="refresh()">Refresh</button>
  <span class="path" id="db-path"></span>
</div>

<div id="content"><div class="loading">Loading...</div></div>

<script>
async function refresh() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('/api/state');
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    render(data);
  } catch (e) {
    content.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function render(d) {
  document.getElementById('db-path').textContent = 'schema: ' + d.state_schema;
  let html = '';

  // Configs
  html += '<h2>Configs</h2>';
  if (d.configs.length === 0) {
    html += '<div class="empty">No configs applied</div>';
  } else {
    html += '<table><tr><th>Name</th><th>Namespace</th><th>Status</th><th>Prefix</th><th>Applied</th></tr>';
    for (const c of d.configs) {
      const status = c.tombstoned
        ? '<span class="badge badge-tombstoned">tombstoned</span>'
        : '<span class="badge badge-active">active</span>';
      html += `<tr><td>${esc(c.name)}</td><td>${esc(c.namespace)}</td><td>${status}</td><td>${esc(c.namespace_prefix || '-')}</td><td>${fmtDate(c.applied_at)}</td></tr>`;
    }
    html += '</table>';
  }

  // Streaming Checkpoints
  html += '<h2>Streaming Checkpoints</h2>';
  if (d.streaming_checkpoints.length === 0) {
    html += '<div class="empty">No streaming checkpoints</div>';
  } else {
    html += '<table><tr><th>Config</th><th>LSN</th><th>Events Processed</th><th>Updated</th></tr>';
    for (const cp of d.streaming_checkpoints) {
      html += `<tr><td>${esc(cp.config_name)}</td><td>${esc(cp.lsn)}</td><td>${num(cp.events_processed)}</td><td>${fmtDate(cp.updated_at)}</td></tr>`;
    }
    html += '</table>';
  }

  // Backfills
  html += '<h2>Backfills</h2>';
  if (d.backfills.length === 0) {
    html += '<div class="empty">No backfill progress</div>';
  } else {
    html += '<table><tr><th>Config</th><th>Status</th><th>Progress</th><th>Last ID</th><th>Started</th></tr>';
    for (const b of d.backfills) {
      const cls = 'badge badge-' + b.status;
      const progress = b.total_rows ? `${num(b.processed_rows)} / ${num(b.total_rows)}` : num(b.processed_rows);
      html += `<tr><td>${esc(b.config_name)}</td><td><span class="${cls}">${esc(b.status)}</span></td><td>${progress}</td><td>${esc(b.last_id || '-')}</td><td>${fmtDate(b.started_at)}</td></tr>`;
    }
    html += '</table>';
  }

  // DLQ
  html += '<h2>Dead Letter Queue</h2>';
  html += `<div style="margin: 8px 0 12px"><span class="stat"><span class="stat-label">Retryable: </span><span class="stat-value">${num(d.dlq.retryable)}</span></span>`;
  html += `<span class="stat"><span class="stat-label">Permanent: </span><span class="stat-value">${num(d.dlq.permanent)}</span></span></div>`;
  if (d.dlq.recent_entries.length > 0) {
    html += '<table><tr><th>ID</th><th>Config</th><th>Kind</th><th>Retries</th><th>Error</th><th>Created</th></tr>';
    for (const e of d.dlq.recent_entries) {
      const cls = 'badge badge-' + e.error_kind.toLowerCase();
      html += `<tr><td>${e.id}</td><td>${esc(e.config_name)}</td><td><span class="${cls}">${esc(e.error_kind)}</span></td><td>${e.retry_count}</td><td title="${esc(e.error_message)}">${esc(e.error_message)}</td><td>${fmtDate(e.created_at)}</td></tr>`;
    }
    html += '</table>';
  }

  document.getElementById('content').innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function num(n) { return n == null ? '-' : n.toLocaleString(); }
function fmtDate(s) { if (!s) return '-'; const d = new Date(s); return d.toLocaleString(); }

refresh();
</script>
</body>
</html>
