[package]
name = "puffgres-core"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
config = { path = "../config" }
pg = { path = "../pg" }
replication = { path = "../replication" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["process", "io-util"] }
uuid = { version = "1.20.0", features = ["v4"] }

[dev-dependencies]
bytes = "1.11.1"
tokio = { version = "1.49.0", features = ["macros", "rt"] }
toml = "1.0.0+spec-1.1.0"
