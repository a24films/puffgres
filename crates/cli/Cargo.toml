[package]
name = "puffgres-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "puffgres"
path = "src/main.rs"

[dependencies]
bytes = "1.11.1"
chrono = "0.4.43"
clap = { version = "4", features = ["derive"] }
config = { path = "../config" }
dotenvy = "0.15"
pg = { path = "../pg" }
puff = { path = "../puff" }
puffgres-core = { path = "../core" }
replication = { path = "../replication" }
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.10.9"
state = { path = "../state" }
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["rt-multi-thread"] }
toml = "1.0.0"

[features]
test-utils = ["dep:tempfile"]

[dependencies.tempfile]
version = "3.17.0"
optional = true

[dev-dependencies]
pg = { path = "../pg", features = ["test-utils"] }
puffgres-cli = { path = ".", features = ["test-utils"] }
temp-env = "0.3.6"
tempfile = "3.17.0"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros"] }
