[package]
name = "state"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4.44", features = ["serde"] }
diesel = { workspace = true, features = ["sqlite"] }
diesel_migrations = { workspace = true }
libsqlite3-sys = { workspace = true }
strum = { version = "0.27.2", features = ["derive"] }
thiserror = "2.0.18"

[dev-dependencies]
tempfile = "3.24.0"
